<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">

<style>

/* ==========================================
   CUSTOMIZE COLORS HERE
   ========================================== */

:root {

  /* Dusty Rose */
  --hours-color: #DDB0A8;
  --minutes-color: #F3E8E1;

  

  --light-text: #FFFFFF;

  /* Warm Taupe for Cream Block */
  --dark-text: #8A7568;

}

/* ========================================== */

* {
  box-sizing: border-box;
}

body {

  margin: 0;

  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  background: transparent;

  font-family: 'Montserrat', sans-serif;

}

.clock {

  display: flex;
  gap: 8px;

}

/* ========================================== */
/* BLOCKS */
/* ========================================== */

.block {

  position: relative;

  width: min(38vw, 180px);
  height: min(52vw, 240px);

  display: flex;
  justify-content: center;
  align-items: center;

}

.hours {

  background: var(--hours-color);

  border-radius: 34px 0 0 34px;

}

.minutes {

  background: var(--minutes-color);

  border-radius: 0 34px 34px 0;

}

/* ========================================== */
/* HOURS BLOCK */
/* ========================================== */

.hours-content {

  width: 100%;
  height: 100%;

  position: relative;

  display: flex;
  justify-content: center;
  align-items: center;

}

.date {

  position: absolute;

  left: 16px;
  bottom: 16px;

  font-size: clamp(10px, 2vw, 13px);

  font-weight: 700;

  letter-spacing: 1px;

  color: rgba(255,255,255,0.95);

}

/* ========================================== */
/* TIME */
/* ========================================== */

.time {

  font-size: clamp(90px, 20vw, 150px);

  font-weight: 900;

  line-height: 0.9;

}

/* Left block text */

.hours .time {

  color: var(--light-text);

}

/* Right block text */

.minutes .time {

  color: var(--dark-text);

}

/* ========================================== */
/* AM PM */
/* ========================================== */

.ampm {

  position: absolute;

  right: 16px;
  bottom: 16px;

  font-size: clamp(12px, 2vw, 16px);

  font-weight: 800;

  color: var(--dark-text);

}

</style>

</head>

<body>

<div class="clock">

  <div class="block hours">

    <div class="hours-content">

      <div class="time" id="hours">12</div>

      <div class="date" id="date">
        MON JUN 18
      </div>

    </div>

  </div>

  <div class="block minutes">

    <div class="time" id="minutes">00</div>

    <div class="ampm" id="ampm">
      PM
    </div>

  </div>

</div>

<script>

function updateClock() {

  const now = new Date();

  let hours = now.getHours();

  const minutes = now.getMinutes();

  const ampm = hours >= 12 ? "PM" : "AM";

  hours = hours % 12;

  hours = hours ? hours : 12;

  document.getElementById("hours").textContent =
    String(hours).padStart(2, "0");

  document.getElementById("minutes").textContent =
    String(minutes).padStart(2, "0");

  document.getElementById("ampm").textContent =
    ampm;

  const options = {
    weekday: "short",
    month: "short",
    day: "numeric"
  };

  document.getElementById("date").textContent =
    now.toLocaleDateString("en-US", options).toUpperCase();

}

updateClock();

setInterval(updateClock, 1000);

</script>

</body>
</html>
