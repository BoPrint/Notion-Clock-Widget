<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&display=swap" rel="stylesheet">

<style>

/* =========================
   THEME COLORS
========================= */

:root {

  --hours-color: rgba(217,181,178,0.92);
  --minutes-color: rgba(243,232,225,0.92);

  --text-light: #FFFFFF;
  --text-dark: #7E6A63;
}

/* =========================
   FRAME STYLE SWITCH (JS CONTROLLED)
========================= */

.widget {
  position: relative;

  display: flex;
  gap: 0px;

  border-radius: 42px;

  overflow: hidden;

  /* default = none */
  border: none;
  box-shadow: none;
}

/* =========================
   FRAME VARIANTS
========================= */

/* 1. NONE (cleanest) */
.frame-none {
  border: none;
  box-shadow: none;
}

/* 2. BORDER (app icon style) */
.frame-border {
  border: 1px solid rgba(255,255,255,0.22);
}

/* 3. GLOW (inset glass depth) */
.frame-glow {
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.14);
}

/* 4. SHINE (top highlight) */
.frame-shine::before {
  content: "";
  position: absolute;
  top: 0;
  left: 6%;
  right: 6%;
  height: 1px;
  background: rgba(255,255,255,0.18);
  z-index: 10;
}

/* 5. GRADIENT (soft material depth) */
.frame-gradient {
  background: linear-gradient(
    to bottom,
    rgba(255,255,255,0.06),
    rgba(255,255,255,0.00)
  );
}

/* ========================= */

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  background: transparent;
  font-family: 'Montserrat', sans-serif;
}

/* =========================
   CLOCK STRUCTURE
========================= */

.clock {
  display: flex;
  align-items: stretch;
}

/* =========================
   DIVIDER (invisible by default)
========================= */

.divider {
  width: 0px;
}

/* =========================
   BLOCKS
========================= */

.block {
  position: relative;

  width: min(180px, 40vw);
  height: min(240px, 52vw);

  display: flex;
  justify-content: center;
  align-items: center;

  backdrop-filter: blur(10px);
}

/* LEFT */
.hours {
  background: var(--hours-color);
  border-radius: 42px 0 0 42px;
}

/* RIGHT */
.minutes {
  background: var(--minutes-color);
  border-radius: 0 42px 42px 0;
}

/* =========================
   TEXT
========================= */

.center {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
}

.time {
  font-size: clamp(100px, 20vw, 150px);
  font-weight: 900;
  line-height: 0.9;
  letter-spacing: -2px;

  font-variant-numeric: tabular-nums;
}

.hours .time {
  color: #FFFFFF;
}

.minutes .time {
  color: var(--text-dark);
}

/* =========================
   LABELS
========================= */

.day {
  position: absolute;
  left: 16px;
  bottom: 16px;

  font-size: 14px;
  font-weight: 800;
  letter-spacing: 1px;

  color: rgba(255,255,255,0.96);
}

.ampm {
  position: absolute;
  right: 16px;
  bottom: 16px;

  font-size: 14px;
  font-weight: 800;
  letter-spacing: 1px;

  color: var(--text-dark);
}

</style>

</head>

<body>

<!-- CHANGE FRAME STYLE HERE -->
<script>
const FRAME_STYLE = "border"; 
// options: none | border | glow | shine | gradient
</script>

<div class="clock" id="clock">

  <div class="widget" id="widget">

    <div class="block hours">
      <div class="center">
        <div class="time" id="hours">12</div>
      </div>
      <div class="day" id="day">FRIDAY</div>
    </div>

    <div class="divider"></div>

    <div class="block minutes">
      <div class="center">
        <div class="time" id="minutes">00</div>
      </div>
      <div class="ampm" id="ampm">PM</div>
    </div>

  </div>

</div>

<script>

/* =========================
   FRAME SWITCHER
========================= */

const widget = document.getElementById("widget");

widget.classList.add("frame-" + FRAME_STYLE);

/* =========================
   CLOCK LOGIC
========================= */

let lastH = "";
let lastM = "";
let lastA = "";

function updateClock() {

  const now = new Date();

  let hours = now.getHours();
  const minutes = now.getMinutes();
  const ampm = hours >= 12 ? "PM" : "AM";

  hours = hours % 12;
  if (hours === 0) hours = 12;

  const h = String(hours).padStart(2, "0");
  const m = String(minutes).padStart(2, "0");

  if (h !== lastH) {
    document.getElementById("hours").textContent = h;
    lastH = h;
  }

  if (m !== lastM) {
    document.getElementById("minutes").textContent = m;
    lastM = m;
  }

  if (ampm !== lastA) {
    document.getElementById("ampm").textContent = ampm;
    lastA = ampm;
  }

  const DAYS = [
    "SUNDAY","MONDAY","TUESDAY","WEDNESDAY",
    "THURSDAY","FRIDAY","SATURDAY"
  ];

  document.getElementById("day").textContent =
    DAYS[now.getDay()];
}

updateClock();
setInterval(updateClock, 60000);

</script>

</body>
</html>
