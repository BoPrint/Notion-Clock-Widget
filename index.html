<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">

<style>

/* ==========================================
   CUSTOMIZE COLORS HERE
   ========================================== */

:root {

  /* Dusty Rose */
  --hours-color: #DFAFA5;

  /* Warm Cream */
  --minutes-color: #EFE5D8;

  --text-color: #FFFFFF;

  --shadow-color: rgba(0,0,0,0.12);

}

/* ========================================== */

* {
  box-sizing: border-box;
}

body {

  margin: 0;

  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  background: transparent;

  font-family: 'Quicksand', sans-serif;

}

.clock {

  display: flex;
  gap: 6px;

}

/* ========================================== */
/* BLOCKS */
/* ========================================== */

.block {

  position: relative;

  width: min(34vw, 150px);
  height: min(48vw, 220px);

  display: flex;
  justify-content: center;
  align-items: center;

  box-shadow: 0 8px 20px var(--shadow-color);

}

.hours {

  background: var(--hours-color);

  border-radius: 30px 0 0 30px;

}

.minutes {

  background: var(--minutes-color);

  border-radius: 0 30px 30px 0;

}

/* ========================================== */
/* HOURS SIDE */
/* ========================================== */

.hours-content {

  width: 100%;
  height: 100%;

  position: relative;

  display: flex;
  justify-content: center;
  align-items: center;

}

.date {

  position: absolute;

  bottom: 14px;
  left: 16px;

  font-size: clamp(10px, 2vw, 13px);

  font-weight: 600;

  letter-spacing: 1px;

  color: rgba(255,255,255,0.92);

}

/* ========================================== */
/* TIME */
/* ========================================== */

.time {

  font-size: clamp(58px, 12vw, 90px);

  font-weight: 700;

  line-height: 1;

  color: var(--text-color);

}

/* ========================================== */
/* AM PM */
/* ========================================== */

.ampm {

  position: absolute;

  bottom: 14px;
  right: 16px;

  font-size: clamp(12px, 2vw, 16px);

  font-weight: 700;

  color: rgba(255,255,255,0.92);

}

</style>

</head>

<body>

<div class="clock">

  <div class="block hours">

    <div class="hours-content">

      <div class="time" id="hours">12</div>

      <div class="date" id="date">
        MON JUN 18
      </div>

    </div>

  </div>

  <div class="block minutes">

    <div class="time" id="minutes">00</div>

    <div class="ampm" id="ampm">
      PM
    </div>

  </div>

</div>

<script>

function updateClock() {

  const now = new Date();

  let hours = now.getHours();

  const minutes = now.getMinutes();

  const ampm = hours >= 12 ? "PM" : "AM";

  hours = hours % 12;

  hours = hours ? hours : 12;

  document.getElementById("hours").textContent =
    String(hours).padStart(2, "0");

  document.getElementById("minutes").textContent =
    String(minutes).padStart(2, "0");

  document.getElementById("ampm").textContent =
    ampm;

  const options = {
    weekday: "short",
    month: "short",
    day: "numeric"
  };

  document.getElementById("date").textContent =
    now.toLocaleDateString("en-US", options).toUpperCase();

}

updateClock();

setInterval(updateClock, 1000);

</script>

</body>
</html>
