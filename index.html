<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">

<style>

/* =========================
   COLORS (EDIT HERE)
========================= */

:root {
  --hours-color: #DDB0A8;
  --minutes-color: #F3E8E1;

  --text-light: #FFFFFF;
  --text-dark: #7E6A63;
}

/* ========================= */

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  background: transparent;

  font-family: 'Montserrat', sans-serif;
}

/* =========================
   CLOCK LAYOUT
========================= */

.clock {
  display: flex;
  gap: 8px;
}

/* =========================
   BLOCKS
========================= */

.block {
  position: relative;

  width: min(40vw, 185px);
  height: min(54vw, 250px);

  display: flex;
  justify-content: center;
  align-items: center;

  overflow: hidden;
}

/* LEFT */
.hours {
  background: var(--hours-color);
  border-radius: 36px 0 0 36px;
}

/* RIGHT */
.minutes {
  background: var(--minutes-color);
  border-radius: 0 36px 36px 0;
}

/* =========================
   CENTERING WRAPPER
========================= */

.center {
  width: 100%;
  height: 100%;

  display: flex;
  justify-content: center;
  align-items: center;

  padding-top: 2px; /* optical centering */
}

/* =========================
   TIME (MAIN DIGITS)
========================= */

.time {
  font-size: clamp(110px, 24vw, 175px);
  font-weight: 900;

  line-height: 0.78;

  font-variant-numeric: tabular-nums;
}

/* COLORS PER SIDE */

.hours .time {
  color: var(--text-light);
}

.minutes .time {
  color: var(--text-dark);
}

/* =========================
   DATE (BOTTOM LEFT)
========================= */

.date {
  position: absolute;

  left: 16px;
  bottom: 16px;

  font-size: clamp(10px, 2vw, 13px);
  font-weight: 700;

  letter-spacing: 1px;

  color: rgba(255,255,255,0.95);
}

/* =========================
   AM / PM (BOTTOM RIGHT)
========================= */

.ampm {
  position: absolute;

  right: 16px;
  bottom: 16px;

  font-size: clamp(12px, 2vw, 16px);
  font-weight: 800;

  color: var(--text-dark);
}

</style>

</head>

<body>

<div class="clock">

  <!-- HOURS -->
  <div class="block hours">

    <div class="center">
      <div class="time" id="hours">12</div>
    </div>

    <div class="date" id="date">MON JUN 18</div>

  </div>

  <!-- MINUTES -->
  <div class="block minutes">

    <div class="center">
      <div class="time" id="minutes">00</div>
    </div>

    <div class="ampm" id="ampm">PM</div>

  </div>

</div>

<script>

function updateClock() {

  const now = new Date();

  let hours = now.getHours();
  const minutes = now.getMinutes();

  const ampm = hours >= 12 ? "PM" : "AM";

  hours = hours % 12;
  if (hours === 0) hours = 12;

  document.getElementById("hours").textContent =
    String(hours).padStart(2, "0");

  document.getElementById("minutes").textContent =
    String(minutes).padStart(2, "0");

  document.getElementById("ampm").textContent = ampm;

  const options = {
    weekday: "short",
    month: "short",
    day: "numeric"
  };

  document.getElementById("date").textContent =
    now.toLocaleDateString("en-US", options).toUpperCase();
}

/* =========================
   SYNCED MINUTE UPDATES
========================= */

function startClock() {

  updateClock();

  const now = new Date();

  const delay = (60 - now.getSeconds()) * 1000;

  setTimeout(() => {

    updateClock();

    setInterval(updateClock, 60000);

  }, delay);

}

startClock();

</script>

</body>
</html>
