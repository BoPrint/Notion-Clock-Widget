<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">

<style>

/* ==========================================
   CUSTOMIZE COLORS HERE
   ========================================== */

:root {

  /* Dusty Rose */
  --hours-color: #DDB0A8;

  /* Warm Cream */
  --minutes-color: #F3E8E1;

  /* White text */
  --light-text: #FFFFFF;

  /* Warm taupe text */
  --dark-text: #7E6A63;

}

/* ========================================== */

* {
  box-sizing: border-box;
}

body {

  margin: 0;

  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  background: transparent;

  font-family: 'Montserrat', sans-serif;

}

.clock {

  display: flex;
  gap: 8px;

}

/* ==========================================
   BLOCKS
   ========================================== */

.block {

  position: relative;

  width: min(38vw, 180px);
  height: min(52vw, 240px);

  display: flex;
  justify-content: center;
  align-items: center;

  overflow: hidden;

}

.hours {

  background: var(--hours-color);

  border-radius: 34px 0 0 34px;

}

.minutes {

  background: var(--minutes-color);

  border-radius: 0 34px 34px 0;

}

/* ==========================================
   OPTICAL CENTERING
   ========================================== */

.center {

  display: flex;
  justify-content: center;
  align-items: center;

  transform: translateY(-4px);

}

/* ==========================================
   TIME
   ========================================== */

.time {

  font-size: clamp(95px, 22vw, 165px);

  font-weight: 900;

  line-height: 0.85;

  transform: scaleY(1.08);

  transform-origin: center;

  font-variant-numeric: tabular-nums;

}

/* Left block */

.hours .time {

  color: var(--light-text);

}

/* Right block */

.minutes .time {

  color: var(--dark-text);

}

/* ==========================================
   DATE
   ========================================== */

.date {

  position: absolute;

  left: 16px;
  bottom: 16px;

  font-size: clamp(10px, 2vw, 13px);

  font-weight: 700;

  letter-spacing: 1px;

  color: rgba(255,255,255,0.95);

}

/* ==========================================
   AM PM
   ========================================== */

.ampm {

  position: absolute;

  right: 16px;
  bottom: 16px;

  font-size: clamp(12px, 2vw, 16px);

  font-weight: 800;

  color: var(--dark-text);

}

</style>

</head>

<body>

<div class="clock">

  <!-- HOURS -->

  <div class="block hours">

    <div class="center">

      <div class="time" id="hours">12</div>

    </div>

    <div class="date" id="date">
      MON, JUN 18
    </div>

  </div>

  <!-- MINUTES -->

  <div class="block minutes">

    <div class="center">

      <div class="time" id="minutes">00</div>

    </div>

    <div class="ampm" id="ampm">
      PM
    </div>

  </div>

</div>

<script>

let lastHours = "";
let lastMinutes = "";
let lastAmPm = "";

function updateClock() {

  const now = new Date();

  let hours = now.getHours();

  const minutes = now.getMinutes();

  const ampm = hours >= 12 ? "PM" : "AM";

  hours = hours % 12;

  if (hours === 0) {
    hours = 12;
  }

  const formattedHours =
    String(hours).padStart(2, "0");

  const formattedMinutes =
    String(minutes).padStart(2, "0");

  if (formattedHours !== lastHours) {

    document.getElementById("hours").textContent =
      formattedHours;

    lastHours = formattedHours;

  }

  if (formattedMinutes !== lastMinutes) {

    document.getElementById("minutes").textContent =
      formattedMinutes;

    lastMinutes = formattedMinutes;

  }

  if (ampm !== lastAmPm) {

    document.getElementById("ampm").textContent =
      ampm;

    lastAmPm = ampm;

  }

  const options = {
    weekday: "short",
    month: "short",
    day: "numeric"
  };

  document.getElementById("date").textContent =
    now.toLocaleDateString("en-US", options)
       .toUpperCase();

}

updateClock();

setInterval(updateClock, 1000);

</script>

</body>
</html>
