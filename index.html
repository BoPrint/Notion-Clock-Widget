<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">

<style>

/* =========================
   COLOR SETTINGS
========================= */

:root {
  --hours-color: #DDB0A8;
  --minutes-color: #F3E8E1;

  --text-light: #FFFFFF;
  --text-dark: #7E6A63;

  --glass: rgba(255,255,255,0.08);
}

/* ========================= */

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  background: transparent;
  font-family: 'Montserrat', sans-serif;
}

/* CLOCK WRAPPER */

.clock {
  display: flex;
  gap: 8px;
}

/* =========================
   BLOCKS
========================= */

.block {
  position: relative;

  width: min(38vw, 180px);
  height: min(52vw, 240px);

  display: flex;
  justify-content: center;
  align-items: center;

  overflow: hidden;

  /* optional glass feel (very subtle) */
  background: var(--glass);
  backdrop-filter: blur(6px);
}

.hours {
  background: var(--hours-color);
  border-radius: 34px 0 0 34px;
}

.minutes {
  background: var(--minutes-color);
  border-radius: 0 34px 34px 0;
}

/* =========================
   OPTICAL CENTERING LAYER
========================= */

.center {
  display: flex;
  flex-direction: column;
  justify-content: center;

  transform: translateY(-2px); /* optical correction */
}

/* =========================
   TIME
========================= */

.time {
  font-size: clamp(95px, 22vw, 165px);
  font-weight: 900;
  line-height: 0.85;

  transform: scaleY(1.08);
  transform-origin: center;

  opacity: 1;
  transition: opacity 0.25s ease;
}

/* fade effect class */
.fade {
  opacity: 0.35;
}

/* =========================
   DATE + AM/PM
========================= */

.date {
  position: absolute;
  bottom: 14px;
  left: 16px;

  font-size: clamp(10px, 2vw, 13px);
  font-weight: 700;

  letter-spacing: 1px;

  color: rgba(255,255,255,0.92);
}

.ampm {
  position: absolute;
  bottom: 14px;
  right: 16px;

  font-size: clamp(12px, 2vw, 16px);
  font-weight: 800;

  color: var(--text-dark);
}

/* =========================
   TEXT COLORS PER SIDE
========================= */

.hours .time,
.hours .date {
  color: var(--text-light);
}

.minutes .time {
  color: var(--text-dark);
}

</style>

</head>

<body>

<div class="clock">

  <!-- HOURS -->
  <div class="block hours">

    <div class="center">

      <div class="time" id="hours">12</div>

    </div>

    <div class="date" id="date">MON JUN 18</div>

  </div>

  <!-- MINUTES -->
  <div class="block minutes">

    <div class="center">

      <div class="time" id="minutes">00</div>

    </div>

    <div class="ampm" id="ampm">PM</div>

  </div>

</div>

<script>

function fadeUpdate(el, value) {
  el.classList.add("fade");

  setTimeout(() => {
    el.textContent = value;
    el.classList.remove("fade");
  }, 120);
}

function updateClock() {

  const now = new Date();

  let hours = now.getHours();
  const minutes = now.getMinutes();
  const ampm = hours >= 12 ? "PM" : "AM";

  hours = hours % 12;
  hours = hours ? hours : 12;

  const hEl = document.getElementById("hours");
  const mEl = document.getElementById("minutes");
  const ampmEl = document.getElementById("ampm");

  fadeUpdate(hEl, String(hours).padStart(2, "0"));
  fadeUpdate(mEl, String(minutes).padStart(2, "0"));
  fadeUpdate(ampmEl, ampm);

  const options = {
    weekday: "short",
    month: "short",
    day: "numeric"
  };

  document.getElementById("date").textContent =
    now.toLocaleDateString("en-US", options).toUpperCase();

}

updateClock();
setInterval(updateClock, 1000);

</script>

</body>
</html>
