<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">

<style>

/* ==================================================
   🌸 THEME SELECTOR
   Change this line only:
   rose | sage | lavender | ocean
================================================== */

const THEME = "rose";

/* ==================================================
   BASE COLORS (DAY MODE DEFAULTS)
================================================== */

:root {

  --hours-color: rgba(221,176,168,0.92);
  --minutes-color: rgba(243,232,225,0.92);

  --text-light: #FFFFFF;
  --text-dark: #7E6A63;

  --glass-border: rgba(255,255,255,0.28);
}

/* ==================================================
   BODY
================================================== */

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  background: transparent;
  font-family: 'Montserrat', sans-serif;
}

/* ==================================================
   CLOCK LAYOUT
================================================== */

.clock {
  display: flex;
  gap: 10px;
}

/* ==================================================
   BLOCKS (FROSTED GLASS STYLE)
================================================== */

.block {
  position: relative;

  width: min(42vw, 190px);
  height: min(56vw, 260px);

  display: flex;
  justify-content: center;
  align-items: center;

  backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);

  overflow: hidden;
}

/* LEFT */
.hours {
  background: var(--hours-color);
  border-radius: 38px 0 0 38px;
}

/* RIGHT */
.minutes {
  background: var(--minutes-color);
  border-radius: 0 38px 38px 0;
}

/* ==================================================
   CENTERING
================================================== */

.center {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
  height: 100%;
}

/* ==================================================
   TIME DIGITS
================================================== */

.time {
  font-size: clamp(120px, 26vw, 190px);
  font-weight: 900;
  line-height: 0.72;

  font-variant-numeric: tabular-nums;
}

/* COLORS PER SIDE */

.hours .time {
  color: var(--text-light);
}

.minutes .time {
  color: var(--text-dark);
}

/* ==================================================
   DATE (BOTTOM LEFT)
================================================== */

.date {
  position: absolute;

  left: 16px;
  bottom: 16px;

  font-size: clamp(10px, 2vw, 13px);
  font-weight: 700;

  letter-spacing: 1px;

  color: rgba(255,255,255,0.95);
}

/* ==================================================
   AM / PM (BOTTOM RIGHT)
================================================== */

.ampm {
  position: absolute;

  right: 16px;
  bottom: 16px;

  font-size: clamp(12px, 2vw, 16px);
  font-weight: 800;

  color: var(--text-dark);
}

</style>

</head>

<body>

<div class="clock">

  <!-- HOURS -->
  <div class="block hours">

    <div class="center">
      <div class="time" id="hours">12</div>
    </div>

    <div class="date" id="date">19 JUNE<br>FRIDAY</div>

  </div>

  <!-- MINUTES -->
  <div class="block minutes">

    <div class="center">
      <div class="time" id="minutes">00</div>
    </div>

    <div class="ampm" id="ampm">PM</div>

  </div>

</div>

<script>

/* ==================================================
   CLOCK LOGIC (NO FLICKER VERSION)
================================================== */

let lastHours = "";
let lastMinutes = "";
let lastAmPm = "";

const MONTHS = [
  "JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE",
  "JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"
];

const DAYS = [
  "SUNDAY","MONDAY","TUESDAY","WEDNESDAY",
  "THURSDAY","FRIDAY","SATURDAY"
];

function updateClock() {

  const now = new Date();

  let hours = now.getHours();
  const minutes = now.getMinutes();
  const ampm = hours >= 12 ? "PM" : "AM";

  hours = hours % 12;
  if (hours === 0) hours = 12;

  const h = String(hours).padStart(2, "0");
  const m = String(minutes).padStart(2, "0");

  if (h !== lastHours) {
    document.getElementById("hours").textContent = h;
    lastHours = h;
  }

  if (m !== lastMinutes) {
    document.getElementById("minutes").textContent = m;
    lastMinutes = m;
  }

  if (ampm !== lastAmPm) {
    document.getElementById("ampm").textContent = ampm;
    lastAmPm = ampm;
  }

  const day = DAYS[now.getDay()];
  const month = MONTHS[now.getMonth()];
  const date = now.getDate();

  document.getElementById("date").innerHTML =
    `${date} ${month}<br>${day}`;
}

/* ==================================================
   SYNCED MINUTE UPDATES
================================================== */

function startClock() {

  updateClock();

  const now = new Date();
  const delay = (60 - now.getSeconds()) * 1000;

  setTimeout(() => {
    updateClock();
    setInterval(updateClock, 60000);
  }, delay);
}

startClock();

</script>

</body>
</html>
