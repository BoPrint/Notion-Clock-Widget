<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&display=swap" rel="stylesheet">

<style>

.divider {
  width: 4px;
  height: 70%;

  background: rgba(255, 255, 255, 0.22);

  border-radius: 999px;

  backdrop-filter: blur(6px);

  align-self: center;
}

/* =========================
   COLORS (WORKING VERSION)
========================= */

:root {
  --hours-color: rgba(221,176,168,0.92);
  --minutes-color: rgba(243,232,225,0.92);

  --text-light: #FFFFFF;
  --text-dark: #7E6A63;

  --glass-border: rgba(255,255,255,0.25);
}

/* ========================= */

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  background: transparent;
  font-family: 'Montserrat', sans-serif;
}

/* =========================
   CLOCK LAYOUT
========================= */

.clock {
  display: flex;
  gap: 10px;
}

/* =========================
   BLOCKS
========================= */

.block {
  position: relative;

  width: min(180px, 40vw);
  height: min(240px, 52vw);

  display: flex;
  justify-content: center;
  align-items: center;

  backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
}

/* LEFT */
.hours {
  background: var(--hours-color);
  border-radius: 36px 0 0 36px;
}

/* RIGHT */
.minutes {
  background: var(--minutes-color);
  border-radius: 0 36px 36px 0;
}

/* =========================
   CENTERING (IMPORTANT FIX)
========================= */

.center {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
  height: 100%;
}

/* =========================
   TIME (FIXED PROPORTIONS)
========================= */

.time {
  font-size: clamp(100px, 20vw, 150px);
  font-weight: 900;
  line-height: 0.9;

  font-variant-numeric: tabular-nums;

  letter-spacing: -2px; /* 👈 FIXES “too wide” look */
}

/* COLORS */

.hours .time {
  color: var(--text-light);
}

.minutes .time {
  color: var(--text-dark);
}

/* =========================
   DATE
========================= */

.date {
  position: absolute;
  left: 14px;
  bottom: 14px;

  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;

  color: rgba(255,255,255,0.95);
}

/* =========================
   AM / PM
========================= */

.ampm {
  position: absolute;
  right: 14px;
  bottom: 14px;

  font-size: 14px;
  font-weight: 800;

  color: var(--text-dark);
}

</style>

</head>

<body>

<div class="clock">

  <div class="block hours">
    <div class="center">
      <div class="time" id="hours">12</div>
    </div>
    <div class="date" id="date">19 JUNE<br>FRIDAY</div>
  </div>

  <div class="block minutes">
    <div class="center">
      <div class="time" id="minutes">00</div>
    </div>
    <div class="ampm" id="ampm">PM</div>
  </div>

</div>

<script>

let lastH = "";
let lastM = "";
let lastA = "";

function updateClock() {

  const now = new Date();

  let hours = now.getHours();
  const minutes = now.getMinutes();
  const ampm = hours >= 12 ? "PM" : "AM";

  hours = hours % 12;
  if (hours === 0) hours = 12;

  const h = String(hours).padStart(2, "0");
  const m = String(minutes).padStart(2, "0");

  if (h !== lastH) {
    document.getElementById("hours").textContent = h;
    lastH = h;
  }

  if (m !== lastM) {
    document.getElementById("minutes").textContent = m;
    lastM = m;
  }

  if (ampm !== lastA) {
    document.getElementById("ampm").textContent = ampm;
    lastA = ampm;
  }

  const MONTHS = [
    "JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE",
    "JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"
  ];

  const DAYS = [
    "SUNDAY","MONDAY","TUESDAY","WEDNESDAY",
    "THURSDAY","FRIDAY","SATURDAY"
  ];

  const day = DAYS[now.getDay()];
  const month = MONTHS[now.getMonth()];
  const date = now.getDate();

  document.getElementById("date").innerHTML =
    `${date} ${month}<br>${day}`;
}

/* SYNC */

updateClock();
setInterval(updateClock, 60000);

</script>

</body>
</html>
